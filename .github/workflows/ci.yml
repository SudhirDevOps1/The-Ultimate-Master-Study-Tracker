name: CI Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  lint-and-check:
    name: Type Check & Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Desktop App Dependencies
      run: |
        cd desktop-app
        npm ci

    - name: Run TypeScript Compiler Check
      run: |
        cd desktop-app
        npx tsc --noEmit || true

  build-desktop-releases:
    name: Build Desktop Apps (Windows, Linux, macOS)
    needs: lint-and-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Desktop Dependencies
      run: |
        cd desktop-app
        npm ci

    - name: Build Web Application
      run: |
        cd desktop-app
        npm run build

    - name: Build Electron App (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd desktop-app
        npx electron-builder --win -c.publish=null
      continue-on-error: true

    - name: Build Electron App (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd desktop-app
        npx electron-builder --linux -c.publish=null
      continue-on-error: true

    - name: Build Electron App (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd desktop-app
        npx electron-builder --mac -c.publish=null
      continue-on-error: true

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: flowtrack-${{ matrix.os }}
        path: desktop-app/dist-electron/
        if-no-files-found: ignore

  publish-github-release:
    name: Publish Release to GitHub
    needs: build-desktop-releases
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Windows Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: flowtrack-windows-latest
        path: ./artifacts/windows

    - name: Download Linux Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: flowtrack-ubuntu-latest
        path: ./artifacts/linux

    - name: Download macOS Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: flowtrack-macos-latest
        path: ./artifacts/macos

    - name: Organize Release Binaries
      run: |
        mkdir -p ./release
        find ./artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} ./release/ \;
        ls -lh ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

